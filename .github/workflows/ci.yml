name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Lint
        run: npm run lint:eslint

      - name: Unit tests
        run: npm test -- --run

      - name: Build
        run: npm run build

  verify-edge-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'

      # deno check risolve i type reference tramite node_modules/@types/node
      # per via del package.json alla radice del progetto — senza le
      # dipendenze npm installate, fallisce sempre (verificato).
      - name: Install dependencies
        run: npm ci

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Type-check Edge Functions
        run: |
          for f in supabase/functions/*/index.ts; do
            echo "Checking $f"
            deno check "$f"
          done
