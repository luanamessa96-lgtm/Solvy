name: Supabase Keep-Alive

on:
  schedule:
    # Ogni 5 giorni alle 08:00 UTC
    - cron: '0 8 */5 * *'
  workflow_dispatch: # permette di avviarlo manualmente dal pannello GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_KEY }}")
          echo "Supabase ping status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Ping fallito con status $STATUS"
            exit 1
          fi
