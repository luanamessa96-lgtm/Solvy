<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4CD9D0"/>
      <stop offset="58%" stop-color="#38BFC8"/>
      <stop offset="100%" stop-color="#C060A0"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.48)"/>
      <stop offset="42%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="doc-clip">
      <path d="M14 0 Q0 0 0 14 L0 86 Q0 100 14 100 L74 100 Q88 100 88 86 L88 28 L60 0 Z"/>
    </clipPath>
  </defs>

  <!-- Shadow -->
  <path d="M14 0 Q0 0 0 14 L0 86 Q0 100 14 100 L74 100 Q88 100 88 86 L88 28 L60 0 Z"
        fill="rgba(0,0,0,0.22)" transform="translate(1.5,2.5)"/>

  <!-- Main document body -->
  <path d="M14 0 Q0 0 0 14 L0 86 Q0 100 14 100 L74 100 Q88 100 88 86 L88 28 L60 0 Z"
        fill="url(#bg)"/>

  <!-- Shine overlay -->
  <path d="M14 0 Q0 0 0 14 L0 86 Q0 100 14 100 L74 100 Q88 100 88 86 L88 28 L60 0 Z"
        fill="url(#shine)"/>

  <!-- Folded corner triangle -->
  <path d="M60 0 L88 28 L60 28 Z" fill="rgba(255,255,255,0.38)"/>

  <!-- Fold diagonal line -->
  <line x1="60" y1="0" x2="88" y2="28" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>

  <!-- Fold bottom horizontal line -->
  <line x1="60" y1="28" x2="88" y2="28" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>

  <!-- Top-left glass border -->
  <path d="M60 0 L14 0 Q0 0 0 14 L0 48"
        fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Three gradient circles clipped to document shape -->
  <circle cx="24" cy="54" r="7" fill="rgba(255,255,255,0.92)" clip-path="url(#doc-clip)"/>
  <circle cx="44" cy="54" r="7" fill="rgba(255,255,255,0.6)" clip-path="url(#doc-clip)"/>
  <circle cx="64" cy="54" r="7" fill="rgba(255,255,255,0.3)" clip-path="url(#doc-clip)"/>
</svg>
