<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="doc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3358A8"/>
      <stop offset="50%" stop-color="#1E3A7A"/>
      <stop offset="100%" stop-color="#132860"/>
    </linearGradient>
    <linearGradient id="fold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B0C8EE"/>
      <stop offset="100%" stop-color="#7A9FD4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="10%" y2="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.7"/>
    </linearGradient>
    <linearGradient id="line2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="line3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Corpo documento = intera icona -->
  <rect width="512" height="512" fill="url(#doc)"/>

  <!-- Maschera angolo piegato: copre angolo top-right con colore uguale al fondo per creare il "taglio" -->
  <polygon points="360,0 512,0 512,152" fill="#132860"/>

  <!-- Triangolo fold (angolo piegato visibile) -->
  <polygon points="360,0 512,152 360,152" fill="url(#fold)"/>

  <!-- Bordo sottile sul triangolo fold -->
  <line x1="360" y1="0" x2="360" y2="152" stroke="rgba(180,210,255,0.3)" stroke-width="2"/>
  <line x1="360" y1="152" x2="512" y2="152" stroke="rgba(180,210,255,0.2)" stroke-width="2"/>

  <!-- Shine glass in alto a sinistra -->
  <rect width="512" height="512" fill="url(#shine)"/>

  <!-- Linee testo -->
  <rect x="110" y="300" width="292" height="28" rx="14" fill="url(#line1)"/>
  <rect x="110" y="350" width="292" height="28" rx="14" fill="url(#line2)"/>
  <rect x="110" y="400" width="200" height="28" rx="14" fill="url(#line3)"/>
</svg>
