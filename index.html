    <style>
      #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#f8fafc;z-index:9999;transition:opacity .25s}
      #splash.hide{opacity:0;pointer-events:none}
      .sp-icon{display:none}
      .sp-ring{width:40px;height:40px;border-radius:50%;background:conic-gradient(from 0deg,#4CD9D0,#C855F7,#4CD9D0);-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),white calc(100% - 4px));mask:radial-gradient(farthest-side,transparent calc(100% - 4px),white calc(100% - 4px));animation:sp-spin .9s linear infinite}
      @keyframes sp-spin{to{transform:rotate(360deg)}}
    </style>
    <title>Solvy — Gestione fatture e finanze per freelance</title>
    <meta name="description" content="Solvy è l'app per freelance italiani e spagnoli che semplifica fatturazione, calcolo tasse IRPEF/IRPF, scadenze fiscali e gestione spese." />
    <meta name="robots" content="index, follow" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Solvy — Gestione fatture per freelance" />
    <meta property="og:description" content="Fatturazione, tasse e scadenze fiscali per freelance in Italia e Spagna. Semplice, veloce, conforme GDPR." />
    <meta property="og:image" content="/icons/solvy-512.png" />
    <meta property="og:locale" content="it_IT" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Solvy — Gestione fatture per freelance" />
    <meta name="twitter:description" content="Fatturazione, tasse e scadenze fiscali per freelance in Italia e Spagna." />
    <meta name="twitter:image" content="/icons/solvy-512.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/solvy-icon-192.png" />
    <link rel="canonical" href="https://solvyapp.com/" />
    <!-- iOS PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Solvy" />
    <meta name="theme-color" content="#0A1628" />
    <script>
      (function(){
        try {
          // Cookie prima (sopravvive a iOS Safari PWA localStorage clear)
          // Chiave cookie: 'st_' + nome con caratteri non-alfanumerici → '_'
          var ckMatch = document.cookie.match(/(?:^|; )st_theme=([^;]*)/);
          var t = ckMatch ? decodeURIComponent(ckMatch[1]) : localStorage.getItem('theme');
          var dark = JSON.parse(localStorage.getItem('darkMode') || 'false');
          var resolved = t || (dark ? 'dark' : 'light');
          var map = { light: 'free-light', dark: 'free-dark' };
          document.documentElement.setAttribute('data-theme', map[resolved] || resolved);
        } catch(e) {}
      })();
    </script>
