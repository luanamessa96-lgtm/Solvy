<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" /></noscript>
    <link rel="preconnect" href="https://supabase.co" />
    <style>
      #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#f8fafc;z-index:9999;transition:opacity .25s}
      #splash.hide{opacity:0;pointer-events:none}
      .sp-icon{display:none}
      .sp-ring{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#4CD9D0,#C855F7);padding:3px;animation:sp-spin .9s linear infinite}
      .sp-ring::after{content:'';display:block;width:100%;height:100%;border-radius:50%;background:#f8fafc}
      @keyframes sp-spin{to{transform:rotate(360deg)}}
    </style>
    <title>Solvy — Gestione fatture e finanze per freelance</title>
    <meta name="description" content="Solvy è l'app per freelance italiani e spagnoli che semplifica fatturazione, calcolo tasse IRPEF/IRPF, scadenze fiscali e gestione spese." />
    <meta name="robots" content="index, follow" />
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Solvy — Gestione fatture per freelance" />
    <meta property="og:description" content="Fatturazione, tasse e scadenze fiscali per freelance in Italia e Spagna. Semplice, veloce, conforme GDPR." />
    <meta property="og:image" content="/icons/solvy-512.png" />
    <meta property="og:locale" content="it_IT" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Solvy — Gestione fatture per freelance" />
    <meta name="twitter:description" content="Fatturazione, tasse e scadenze fiscali per freelance in Italia e Spagna." />
    <meta name="twitter:image" content="/icons/solvy-512.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="canonical" href="https://solvy.app/" />
    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Solvy" />
    <meta name="theme-color" content="#0A1628" />
    <script src="/theme-init.js"></script>
  </head>
  <body>
    <div id="splash" role="status" aria-label="Caricamento Solvy">
      <div class="sp-icon"></div>
      <div class="sp-ring"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
